<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="zamzamSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="40%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0077b6"/>
      <stop offset="50%" stop-color="#0096c7"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="gold7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#zamzamSky)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="50" cy="30" r="1"/>
    <circle cx="150" cy="20" r="1.2"/>
    <circle cx="250" cy="35" r="0.8"/>
    <circle cx="350" cy="25" r="1.1"/>
    <circle cx="100" cy="60" r="0.9"/>
    <circle cx="300" cy="50" r="1"/>
  </g>

  <!-- Zamzam well structure -->
  <ellipse cx="200" cy="350" rx="100" ry="80" fill="#16213e"/>

  <!-- Well -->
  <ellipse cx="200" cy="330" rx="60" ry="40" fill="#0f3460"/>
  <ellipse cx="200" cy="325" rx="55" ry="35" fill="#0077b6" opacity="0.3"/>

  <!-- Water surface -->
  <ellipse cx="200" cy="335" rx="45" ry="25" fill="url(#water)"/>

  <!-- Water ripples -->
  <g fill="none" stroke="#00b4d8" stroke-width="0.8" opacity="0.4">
    <ellipse cx="200" cy="335" rx="15" ry="8"/>
    <ellipse cx="200" cy="335" rx="25" ry="14"/>
    <ellipse cx="200" cy="335" rx="35" ry="20"/>
  </g>

  <!-- Well rim -->
  <ellipse cx="200" cy="320" rx="65" ry="38" fill="none" stroke="url(#gold7)" stroke-width="3"/>

  <!-- Gold decorations -->
  <circle cx="200" cy="282" r="8" fill="url(#gold7)"/>
  <rect x="165" y="290" width="70" height="4" fill="url(#gold7)" opacity="0.5"/>

  <!-- Structure around well -->
  <rect x="100" y="300" width="200" height="120" fill="#16213e" rx="5"/>
  <rect x="100" y="295" width="200" height="10" fill="url(#gold7)" opacity="0.3"/>

  <!-- Arches -->
  <g fill="none" stroke="url(#gold7)" stroke-width="1.5" opacity="0.3">
    <path d="M110,300 Q135,280 160,300"/>
    <path d="M170,300 Q195,280 220,300"/>
    <path d="M240,300 Q265,280 290,300"/>
  </g>

  <!-- Dome above -->
  <ellipse cx="200" cy="295" rx="80" ry="40" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="200" cy="258" r="5" fill="url(#gold7)"/>

  <!-- People -->
  <g fill="#fff" opacity="0.2">
    <circle cx="140" cy="370" r="4"/>
    <circle cx="170" cy="375" r="4"/>
    <circle cx="230" cy="375" r="4"/>
    <circle cx="260" cy="370" r="4"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="440" width="400" height="160" fill="#0a0a1a"/>

  <!-- Water drops -->
  <g fill="#00b4d8" opacity="0.5">
    <circle cx="190" cy="345" r="2"/>
    <circle cx="210" cy="343" r="1.5"/>
    <circle cx="200" cy="348" r="1.8"/>
  </g>

  <!-- Title -->
  <text x="200" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#00b4d8" font-weight="bold">زمزم</text>
  <text x="200" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">Zamzam Well</text>
</svg>
