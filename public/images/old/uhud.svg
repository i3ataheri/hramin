<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="uhudSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="25%" stop-color="#f7c59f"/>
      <stop offset="50%" stop-color="#efefd0"/>
      <stop offset="100%" stop-color="#b5838d"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b3a2a"/>
      <stop offset="100%" stop-color="#4a2518"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5e3c"/>
      <stop offset="100%" stop-color="#5c3d2e"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#uhudSky)"/>

  <!-- Sun -->
  <circle cx="320" cy="100" r="40" fill="#ff6b35" opacity="0.8"/>
  <circle cx="320" cy="100" r="55" fill="#ff6b35" opacity="0.2"/>

  <!-- Mountains - Mount Uhud -->
  <polygon points="0,380 80,220 160,280 200,200 280,260 350,180 400,300 400,380" fill="url(#mountain1)"/>
  <polygon points="0,380 50,300 120,320 180,280 250,310 320,270 400,350 400,380" fill="url(#mountain2)"/>

  <!-- Mountain texture -->
  <g fill="none" stroke="#4a2518" stroke-width="0.5" opacity="0.3">
    <line x1="100" y1="280" x2="150" y2="300"/>
    <line x1="200" y1="260" x2="240" y2="290"/>
    <line x1="300" y1="250" x2="330" y2="280"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="380" width="400" height="220" fill="#b5838d"/>

  <!-- Uhud Mosque -->
  <rect x="50" y="400" width="120" height="80" fill="#e8d5b7" rx="3"/>
  <rect x="50" y="395" width="120" height="10" fill="#c9a96e"/>

  <!-- Minaret -->
  <rect x="60" y="350" width="10" height="50" fill="#e8d5b7"/>
  <polygon points="60,350 65,335 70,350" fill="#e8d5b7"/>
  <circle cx="65" cy="333" r="3" fill="#c9a96e"/>

  <!-- Arch windows -->
  <g fill="#b5838d">
    <rect x="65" y="415" width="20" height="25" rx="10"/>
    <rect x="100" y="415" width="20" height="25" rx="10"/>
    <rect x="135" y="415" width="20" height="25" rx="10"/>
  </g>

  <!-- Martyrs Cemetery markers -->
  <g fill="#c9a96e" opacity="0.6">
    <rect x="220" y="420" width="3" height="20" rx="1"/>
    <rect x="240" y="418" width="3" height="22" rx="1"/>
    <rect x="260" y="422" width="3" height="18" rx="1"/>
    <rect x="280" y="416" width="3" height="24" rx="1"/>
    <rect x="300" y="420" width="3" height="20" rx="1"/>
    <rect x="320" y="418" width="3" height="22" rx="1"/>
    <rect x="340" y="422" width="3" height="18" rx="1"/>
  </g>

  <!-- Trees -->
  <g fill="#6b3a2a" opacity="0.4">
    <ellipse cx="230" cy="410" rx="15" ry="10"/>
    <ellipse cx="310" cy="412" rx="12" ry="8"/>
  </g>

  <!-- Title -->
  <text x="200" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#6b3a2a" font-weight="bold">جبل أحد</text>
  <text x="200" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4a2518">Mount Uhud</text>
</svg>
