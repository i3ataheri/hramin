<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="muzSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="30%" stop-color="#4a1942"/>
      <stop offset="60%" stop-color="#c84b31"/>
      <stop offset="100%" stop-color="#f7c59f"/>
    </linearGradient>
    <linearGradient id="gold13" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#muzSky)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.5">
    <circle cx="50" cy="30" r="1"/>
    <circle cx="150" cy="20" r="1.2"/>
    <circle cx="250" cy="35" r="0.9"/>
    <circle cx="350" cy="25" r="1.1"/>
  </g>

  <!-- Mountains -->
  <polygon points="0,350 80,250 160,300 240,240 320,280 400,260 400,350" fill="#2d1b69" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="350" width="400" height="250" fill="#c84b31" opacity="0.3"/>
  <rect x="0" y="350" width="400" height="250" fill="#e8d5b7"/>

  <!-- Sleeping area (open air) -->
  <g fill="#d4a76a" opacity="0.4">
    <rect x="50" y="380" width="300" height="60" rx="5"/>
  </g>

  <!-- People sleeping -->
  <g fill="#8b7355" opacity="0.3">
    <ellipse cx="100" cy="405" rx="20" ry="8"/>
    <ellipse cx="160" cy="405" rx="20" ry="8"/>
    <ellipse cx="220" cy="405" rx="20" ry="8"/>
    <ellipse cx="280" cy="405" rx="20" ry="8"/>
    <ellipse cx="340" cy="405" rx="20" ry="8"/>
  </g>

  <!-- Pillars (landmarks) -->
  <g fill="#c9a96e" opacity="0.5">
    <rect x="80" y="370" width="3" height="15"/>
    <rect x="160" y="370" width="3" height="15"/>
    <rect x="240" y="370" width="3" height="15"/>
    <rect x="320" y="370" width="3" height="15"/>
  </g>

  <!-- Road -->
  <path d="M0,420 Q100,415 200,420 Q300,425 400,420" fill="none" stroke="#c9a96e" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="200" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#c84b31" font-weight="bold">مüzدلیفه</text>
  <text x="200" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8b7355">Muzdalifah</text>
</svg>
