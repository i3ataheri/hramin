<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="arafatSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="40%" stop-color="#e0f0ff"/>
      <stop offset="100%" stop-color="#fff8e7"/>
    </linearGradient>
    <linearGradient id="gold10" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#arafatSky)"/>

  <!-- Clouds -->
  <g fill="#fff" opacity="0.6">
    <ellipse cx="80" cy="60" rx="50" ry="20"/>
    <ellipse cx="200" cy="80" rx="60" ry="22"/>
    <ellipse cx="320" cy="50" rx="45" ry="18"/>
    <ellipse cx="150" cy="100" rx="35" ry="14"/>
  </g>

  <!-- Jabal al-Rahmah -->
  <ellipse cx="200" cy="320" rx="140" ry="80" fill="#d4a76a"/>
  <ellipse cx="200" cy="315" rx="130" ry="75" fill="#e0b87a"/>

  <!-- Pillar on top -->
  <rect x="195" y="260" width="10" height="35" fill="#8b7355"/>
  <rect x="190" y="255" width="20" height="8" fill="#8b7355" rx="2"/>

  <!-- Ground - Arafat plain -->
  <rect x="0" y="380" width="400" height="220" fill="#e8d5b7"/>

  <!-- Tents -->
  <g fill="#fff" opacity="0.7">
    <polygon points="60,380 80,350 100,380"/>
    <polygon points="120,380 140,350 160,380"/>
    <polygon points="240,380 260,350 280,380"/>
    <polygon points="300,380 320,350 340,380"/>
    <polygon points="50,400 70,370 90,400"/>
    <polygon points="130,400 150,370 170,400"/>
    <polygon points="230,400 250,370 270,400"/>
    <polygon points="310,400 330,370 350,400"/>
  </g>

  <!-- People -->
  <g fill="#6b5b3a" opacity="0.3">
    <circle cx="80" cy="395" r="3"/>
    <circle cx="140" cy="398" r="3"/>
    <circle cx="200" cy="393" r="3"/>
    <circle cx="260" cy="397" r="3"/>
    <circle cx="320" cy="395" r="3"/>
    <circle cx="100" cy="415" r="3"/>
    <circle cx="160" cy="412" r="3"/>
    <circle cx="240" cy="418" r="3"/>
    <circle cx="300" cy="415" r="3"/>
  </g>

  <!-- Road -->
  <path d="M0,430 Q100,425 200,430 Q300,435 400,430" fill="none" stroke="#c9a96e" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="200" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#6b5b3a" font-weight="bold">عرفات</text>
  <text x="200" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8b7355">Arafat</text>
</svg>
