<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="qubaSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="30%" stop-color="#16213e"/>
      <stop offset="60%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <linearGradient id="gold12" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#qubaSky)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="40" cy="30" r="1.2"/>
    <circle cx="120" cy="50" r="1"/>
    <circle cx="200" cy="20" r="1.5"/>
    <circle cx="280" cy="40" r="1.1"/>
    <circle cx="360" cy="25" r="1.3"/>
    <circle cx="80" cy="80" r="0.8"/>
    <circle cx="320" cy="70" r="0.9"/>
  </g>

  <!-- Moon -->
  <circle cx="320" cy="80" r="25" fill="#fffbe6" opacity="0.9"/>
  <circle cx="330" cy="75" r="20" fill="#1a1a2e"/>

  <!-- Mosque Quba -->
  <rect x="80" y="280" width="240" height="120" fill="#0f3460"/>
  <rect x="80" y="275" width="240" height="10" fill="url(#gold12)" opacity="0.5"/>

  <!-- Dome -->
  <ellipse cx="200" cy="275" rx="80" ry="45" fill="#16213e"/>
  <ellipse cx="200" cy="270" rx="70" ry="40" fill="#1a1a3e"/>
  <circle cx="200" cy="232" r="5" fill="url(#gold12)"/>

  <!-- Minarets -->
  <rect x="85" y="210" width="10" height="70" fill="#16213e"/>
  <polygon points="85,210 90,195 95,210" fill="#16213e"/>
  <circle cx="90" cy="193" r="4" fill="url(#gold12)"/>

  <rect x="305" y="210" width="10" height="70" fill="#16213e"/>
  <polygon points="305,210 310,195 315,210" fill="#16213e"/>
  <circle cx="310" cy="193" r="4" fill="url(#gold12)"/>

  <!-- Windows -->
  <g fill="#0f3460" opacity="0.6">
    <rect x="110" y="300" width="25" height="35" rx="12"/>
    <rect x="160" y="300" width="25" height="35" rx="12"/>
    <rect x="215" y="300" width="25" height="35" rx="12"/>
    <rect x="265" y="300" width="25" height="35" rx="12"/>
  </g>

  <!-- Door -->
  <rect x="185" y="340" width="30" height="60" fill="#16213e" rx="15"/>

  <!-- Ground -->
  <rect x="0" y="400" width="400" height="200" fill="#0a0a1a"/>

  <!-- Palm trees -->
  <g fill="#1a3a2a" opacity="0.5">
    <rect x="50" y="380" width="4" height="40"/>
    <ellipse cx="52" cy="375" rx="20" ry="15"/>
    <rect x="340" y="380" width="4" height="40"/>
    <ellipse cx="342" cy="375" rx="20" ry="15"/>
  </g>

  <!-- Title -->
  <text x="200" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffd700" font-weight="bold">مسجد قباء</text>
  <text x="200" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#533483">Quba Mosque</text>
</svg>
