<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="ramaSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="30%" stop-color="#1b263b"/>
      <stop offset="60%" stop-color="#415a77"/>
      <stop offset="100%" stop-color="#778da9"/>
    </linearGradient>
    <linearGradient id="gold8" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#ramaSky)"/>

  <!-- Mountains -->
  <polygon points="0,300 80,180 160,300" fill="#1b263b" opacity="0.6"/>
  <polygon points="100,300 200,150 300,300" fill="#0d1b2a" opacity="0.7"/>
  <polygon points="240,300 340,190 400,300" fill="#1b263b" opacity="0.5"/>

  <!-- City lights -->
  <g fill="#ffd700" opacity="0.3">
    <circle cx="50" cy="310" r="2"/>
    <circle cx="120" cy="305" r="1.5"/>
    <circle cx="180" cy="312" r="2"/>
    <circle cx="250" cy="308" r="1.8"/>
    <circle cx="320" cy="315" r="2"/>
    <circle cx="370" cy="310" r="1.5"/>
  </g>

  <!-- Mosque silhouette -->
  <g fill="#0d1b2a">
    <rect x="80" y="300" width="240" height="120"/>
    <ellipse cx="200" cy="300" rx="80" ry="40"/>
    <rect x="90" y="240" width="10" height="60"/>
    <circle cx="95" cy="238" r="5" fill="url(#gold8)"/>
    <rect x="300" y="240" width="10" height="60"/>
    <circle cx="305" cy="238" r="5" fill="url(#gold8)"/>
  </g>

  <!-- Kaaba -->
  <rect x="170" y="320" width="60" height="60" fill="#0a0a0a"/>
  <rect x="170" y="335" width="60" height="5" fill="url(#gold8)"/>
  <rect x="185" y="345" width="30" height="35" fill="url(#gold8)" rx="1"/>

  <!-- Ground -->
  <rect x="0" y="420" width="400" height="180" fill="#0d1b2a"/>

  <!-- Reflection -->
  <g fill="#ffd700" opacity="0.1">
    <ellipse cx="200" cy="430" rx="60" ry="5"/>
  </g>

  <!-- Title -->
  <text x="200" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffd700" font-weight="bold">منظر مكة</text>
  <text x="200" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#778da9">View of Makkah</text>
</svg>
