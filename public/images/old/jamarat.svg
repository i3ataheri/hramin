<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="jamaratSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="30%" stop-color="#f7c59f"/>
      <stop offset="60%" stop-color="#efefd0"/>
      <stop offset="100%" stop-color="#b5838d"/>
    </linearGradient>
    <linearGradient id="gold14" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#jamaratSky)"/>

  <!-- Sun -->
  <circle cx="200" cy="80" r="35" fill="#ff6b35" opacity="0.7"/>

  <!-- Mountains -->
  <polygon points="0,300 100,200 200,280 300,190 400,270 400,300" fill="#b5838d" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="300" width="400" height="300" fill="#e8d5b7"/>

  <!-- Jamarat Bridge -->
  <rect x="50" y="320" width="300" height="40" fill="#8b7355" rx="5"/>
  <rect x="55" y="325" width="290" height="30" fill="#a08060" rx="3"/>

  <!-- Pillars -->
  <g fill="#6b5b3a">
    <rect x="100" y="315" width="8" height="50"/>
    <rect x="200" y="315" width="8" height="50"/>
    <rect x="300" y="315" width="8" height="50"/>
  </g>

  <!-- Jamarat (pillars) -->
  <rect x="120" y="290" width="15" height="30" fill="#c9a96e" rx="2"/>
  <rect x="195" y="285" width="15" height="35" fill="#c9a96e" rx="2"/>
  <rect x="270" y="290" width="15" height="30" fill="#c9a96e" rx="2"/>

  <!-- People on bridge -->
  <g fill="#5a4a3a" opacity="0.3">
    <circle cx="80" cy="340" r="3"/>
    <circle cx="120" cy="338" r="3"/>
    <circle cx="160" cy="342" r="3"/>
    <circle cx="200" cy="338" r="3"/>
    <circle cx="240" cy="340" r="3"/>
    <circle cx="280" cy="338" r="3"/>
    <circle cx="320" cy="342" r="3"/>
  </g>

  <!-- Road below -->
  <rect x="0" y="370" width="400" height="230" fill="#d4a76a"/>

  <!-- Cars -->
  <g fill="#8b7355" opacity="0.3">
    <rect x="50" y="400" width="30" height="12" rx="3"/>
    <rect x="150" y="405" width="30" height="12" rx="3"/>
    <rect x="250" y="398" width="30" height="12" rx="3"/>
    <rect x="350" y="403" width="30" height="12" rx="3"/>
  </g>

  <!-- Title -->
  <text x="200" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#6b3a2a" font-weight="bold">جمرات</text>
  <text x="200" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4a2518">Jamarat</text>
</svg>
