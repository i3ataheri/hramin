<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="midnight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000428"/>
      <stop offset="50%" stop-color="#001845"/>
      <stop offset="100%" stop-color="#023e7d"/>
    </linearGradient>
    <radialGradient id="light1" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#midnight)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.9">
    <circle cx="30" cy="30" r="1.5"/>
    <circle cx="90" cy="60" r="1"/>
    <circle cx="150" cy="20" r="1.8"/>
    <circle cx="250" cy="40" r="1.2"/>
    <circle cx="370" cy="25" r="1.4"/>
    <circle cx="60" cy="100" r="0.8"/>
    <circle cx="340" cy="70" r="1.1"/>
    <circle cx="200" cy="50" r="1.3"/>
    <circle cx="310" cy="110" r="0.9"/>
    <circle cx="120" cy="80" r="1"/>
    <circle cx="50" cy="150" r="1.2"/>
    <circle cx="380" cy="140" r="0.7"/>
  </g>

  <!-- Light glow -->
  <circle cx="200" cy="350" r="200" fill="url(#light1)"/>

  <!-- Kaaba - center focus -->
  <rect x="150" y="280" width="100" height="100" fill="#0a0a0a" rx="3"/>
  <rect x="150" y="310" width="100" height="10" fill="url(#gold4)"/>
  <rect x="150" y="325" width="100" height="4" fill="url(#gold4)" opacity="0.5"/>
  <rect x="150" y="340" width="100" height="3" fill="url(#gold4)" opacity="0.3"/>

  <!-- Kaaba door -->
  <rect x="175" y="340" width="50" height="40" fill="url(#gold4)" rx="2"/>

  <!-- Kaaba top -->
  <line x1="150" y1="285" x2="250" y2="285" stroke="url(#gold4)" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="278" r="3" fill="url(#gold4)"/>

  <!-- Circumambulation lines (Tawaf) -->
  <g fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.15">
    <rect x="120" y="260" width="160" height="140" rx="10"/>
    <rect x="100" y="245" width="200" height="170" rx="12"/>
    <rect x="80" y="230" width="240" height="200" rx="14"/>
  </g>

  <!-- Corner pillars -->
  <rect x="145" y="275" width="8" height="110" fill="#1a1a1a"/>
  <rect x="247" y="275" width="8" height="110" fill="#1a1a1a"/>
  <rect x="145" y="275" width="110" height="8" fill="#1a1a1a"/>

  <!-- Surrounding structure -->
  <g fill="#0a1a3a" opacity="0.6">
    <rect x="20" y="330" width="120" height="170"/>
    <rect x="260" y="330" width="120" height="170"/>
  </g>

  <!-- Arches -->
  <g fill="none" stroke="url(#gold4)" stroke-width="1" opacity="0.3">
    <path d="M30,330 Q60,310 90,330"/>
    <path d="M80,330 Q110,310 140,330"/>
    <path d="M260,330 Q290,310 320,330"/>
    <path d="M310,330 Q340,310 370,330"/>
  </g>

  <!-- Minarets -->
  <rect x="40" y="200" width="10" height="130" fill="#0d2847"/>
  <circle cx="45" cy="198" r="5" fill="url(#gold4)"/>
  <rect x="350" y="200" width="10" height="130" fill="#0d2847"/>
  <circle cx="355" cy="198" r="5" fill="url(#gold4)"/>

  <!-- Ground -->
  <rect x="0" y="440" width="400" height="160" fill="#000428"/>
  <rect x="0" y="440" width="400" height="8" fill="url(#gold4)" opacity="0.2"/>

  <!-- Title -->
  <text x="200" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffd700" font-weight="bold">ليلة في الحرم</text>
  <text x="200" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">Night at the Haram</text>
</svg>
