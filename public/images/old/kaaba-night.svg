<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="40%" stop-color="#1a2744"/>
      <stop offset="70%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#4a1942"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe6"/>
      <stop offset="60%" stop-color="#f5e6a3"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e6a3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5e6a3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kaaba" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="goldBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="30%" stop-color="#f5d060"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="70%" stop-color="#f5d060"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.8">
    <circle cx="50" cy="40" r="1.2"/>
    <circle cx="120" cy="70" r="0.8"/>
    <circle cx="200" cy="25" r="1.5"/>
    <circle cx="280" cy="55" r="1"/>
    <circle cx="350" cy="35" r="1.3"/>
    <circle cx="80" cy="100" r="0.7"/>
    <circle cx="320" cy="80" r="0.9"/>
    <circle cx="170" cy="90" r="1.1"/>
    <circle cx="380" cy="110" r="0.8"/>
    <circle cx="30" cy="130" r="1"/>
    <circle cx="250" cy="45" r="0.6"/>
    <circle cx="140" cy="50" r="0.9"/>
  </g>

  <!-- Moon -->
  <circle cx="320" cy="100" r="60" fill="url(#moonGlow)"/>
  <circle cx="320" cy="100" r="30" fill="url(#moon)" filter="url(#glow)"/>

  <!-- Minaret Left -->
  <rect x="75" y="280" width="14" height="200" fill="#2a2a2a" rx="2"/>
  <rect x="71" y="275" width="22" height="10" fill="#333" rx="2"/>
  <circle cx="82" cy="270" r="8" fill="#333"/>
  <circle cx="82" cy="270" r="5" fill="url(#goldBand)"/>
  <rect x="73" y="300" width="18" height="3" fill="url(#goldBand)" opacity="0.6"/>
  <rect x="73" y="350" width="18" height="3" fill="url(#goldBand)" opacity="0.6"/>
  <rect x="73" y="400" width="18" height="3" fill="url(#goldBand)" opacity="0.6"/>

  <!-- Minaret Right -->
  <rect x="311" y="280" width="14" height="200" fill="#2a2a2a" rx="2"/>
  <rect x="307" y="275" width="22" height="10" fill="#333" rx="2"/>
  <circle cx="318" cy="270" r="8" fill="#333"/>
  <circle cx="318" cy="270" r="5" fill="url(#goldBand)"/>
  <rect x="309" y="300" width="18" height="3" fill="url(#goldBand)" opacity="0.6"/>
  <rect x="309" y="350" width="18" height="3" fill="url(#goldBand)" opacity="0.6"/>
  <rect x="309" y="400" width="18" height="3" fill="url(#goldBand)" opacity="0.6"/>

  <!-- Dome -->
  <ellipse cx="200" cy="340" rx="100" ry="60" fill="#1e1e1e"/>
  <ellipse cx="200" cy="335" rx="90" ry="55" fill="#252525"/>
  <circle cx="200" cy="280" r="8" fill="url(#goldBand)"/>

  <!-- Kaaba -->
  <rect x="160" y="360" width="80" height="80" fill="url(#kaaba)" rx="2"/>
  <!-- Gold band -->
  <rect x="160" y="385" width="80" height="8" fill="url(#goldBand)"/>
  <rect x="160" y="398" width="80" height="3" fill="url(#goldBand)" opacity="0.5"/>
  <!-- Door -->
  <rect x="185" y="400" width="30" height="40" fill="url(#goldBand)" rx="1"/>
  <!-- Kiswah pattern -->
  <line x1="160" y1="370" x2="240" y2="370" stroke="url(#goldBand)" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="420" x2="240" y2="420" stroke="url(#goldBand)" stroke-width="1" opacity="0.3"/>

  <!-- Crowd silhouettes -->
  <g fill="#1a1a1a" opacity="0.7">
    <ellipse cx="50" cy="450" rx="20" ry="8"/>
    <ellipse cx="100" cy="455" rx="18" ry="7"/>
    <ellipse cx="140" cy="448" rx="22" ry="9"/>
    <ellipse cx="260" cy="452" rx="20" ry="8"/>
    <ellipse cx="300" cy="448" rx="18" ry="7"/>
    <ellipse cx="350" cy="454" rx="22" ry="9"/>
  </g>

  <!-- Ground reflection -->
  <rect x="0" y="450" width="400" height="150" fill="#0d0d0d"/>
  <rect x="0" y="450" width="400" height="10" fill="url(#goldBand)" opacity="0.15"/>

  <!-- Title -->
  <text x="200" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#f5d060" font-weight="bold">المسجد الحرام</text>
  <text x="200" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">Masjid al-Haram</text>
</svg>
