<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="praySky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="40%" stop-color="#16213e"/>
      <stop offset="70%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <radialGradient id="prayerLight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold9" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#praySky)"/>

  <!-- Light -->
  <circle cx="200" cy="150" r="200" fill="url(#prayerLight)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.5">
    <circle cx="30" cy="30" r="1"/>
    <circle cx="100" cy="50" r="1.2"/>
    <circle cx="300" cy="40" r="1"/>
    <circle cx="370" cy="25" r="1.1"/>
  </g>

  <!-- Mosque interior -->
  <rect x="0" y="300" width="400" height="300" fill="#16213e"/>

  <!-- Pillars -->
  <g fill="#1a1a2e">
    <rect x="40" y="200" width="15" height="200"/>
    <rect x="120" y="200" width="15" height="200"/>
    <rect x="265" y="200" width="15" height="200"/>
    <rect x="345" y="200" width="15" height="200"/>
  </g>

  <!-- Arches between pillars -->
  <g fill="none" stroke="url(#gold9)" stroke-width="2" opacity="0.3">
    <path d="M47,200 Q80,170 113,200"/>
    <path d="M127,200 Q160,170 193,200"/>
    <path d="M272,200 Q305,170 338,200"/>
  </g>

  <!-- Mihrab (prayer niche) -->
  <path d="M170,280 Q200,240 230,280 L230,350 L170,350 Z" fill="#0f3460"/>
  <path d="M175,280 Q200,245 225,280" fill="none" stroke="url(#gold9)" stroke-width="2" opacity="0.5"/>

  <!-- Prayer rug patterns -->
  <g fill="none" stroke="url(#gold9)" stroke-width="0.5" opacity="0.2">
    <rect x="80" y="400" width="50" height="80" rx="2"/>
    <rect x="140" y="400" width="50" height="80" rx="2"/>
    <rect x="210" y="400" width="50" height="80" rx="2"/>
    <rect x="270" y="400" width="50" height="80" rx="2"/>
  </g>

  <!-- People praying -->
  <g fill="#533483" opacity="0.5">
    <ellipse cx="105" cy="440" rx="15" ry="8"/>
    <ellipse cx="165" cy="440" rx="15" ry="8"/>
    <ellipse cx="235" cy="440" rx="15" ry="8"/>
    <ellipse cx="295" cy="440" rx="15" ry="8"/>
  </g>

  <!-- Chandelier -->
  <line x1="200" y1="150" x2="200" y2="200" stroke="url(#gold9)" stroke-width="1"/>
  <circle cx="200" cy="205" r="12" fill="url(#gold9)" opacity="0.6"/>
  <circle cx="200" cy="205" r="6" fill="#ffd700" opacity="0.8"/>

  <!-- Floor pattern -->
  <g fill="none" stroke="#533483" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="380" x2="400" y2="380"/>
    <line x1="0" y1="420" x2="400" y2="420"/>
    <line x1="0" y1="460" x2="400" y2="460"/>
    <line x1="0" y1="500" x2="400" y2="500"/>
  </g>

  <!-- Title -->
  <text x="200" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffd700" font-weight="bold">صلاة في الحرم</text>
  <text x="200" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#778da9">Prayer at the Haram</text>
</svg>
