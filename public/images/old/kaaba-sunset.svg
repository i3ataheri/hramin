<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="sunrise" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="20%" stop-color="#3d1155"/>
      <stop offset="45%" stop-color="#e84393"/>
      <stop offset="65%" stop-color="#fd79a8"/>
      <stop offset="80%" stop-color="#fdcb6e"/>
      <stop offset="100%" stop-color="#ffeaa7"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#ffeaa7"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </radialGradient>
    <linearGradient id="goldBand2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#sunrise)"/>

  <!-- Sun -->
  <circle cx="200" cy="260" r="80" fill="#fdcb6e" opacity="0.3"/>
  <circle cx="200" cy="260" r="50" fill="url(#sun)"/>

  <!-- Clouds -->
  <g fill="#fff" opacity="0.15">
    <ellipse cx="80" cy="180" rx="60" ry="20"/>
    <ellipse cx="320" cy="200" rx="50" ry="15"/>
    <ellipse cx="150" cy="220" rx="40" ry="12"/>
  </g>

  <!-- Mosque silhouette -->
  <g fill="#2d1b4e" opacity="0.9">
    <!-- Main building -->
    <rect x="50" y="320" width="300" height="180"/>

    <!-- Dome -->
    <ellipse cx="200" cy="320" rx="90" ry="50" fill="#3d1155"/>

    <!-- Minaret Left -->
    <rect x="60" y="240" width="16" height="80"/>
    <polygon points="60,240 68,220 76,240" fill="#3d1155"/>
    <circle cx="68" cy="218" r="4" fill="#ffd700"/>

    <!-- Minaret Right -->
    <rect x="324" y="240" width="16" height="80"/>
    <polygon points="324,240 332,220 340,240" fill="#3d1155"/>
    <circle cx="332" cy="218" r="4" fill="#ffd700"/>

    <!-- Small domes -->
    <ellipse cx="100" cy="330" rx="25" ry="15" fill="#3d1155"/>
    <ellipse cx="300" cy="330" rx="25" ry="15" fill="#3d1155"/>
  </g>

  <!-- Kaaba -->
  <rect x="165" y="340" width="70" height="70" fill="#1a0a2e" rx="2"/>
  <rect x="165" y="360" width="70" height="6" fill="url(#goldBand2)"/>
  <rect x="185" y="375" width="30" height="35" fill="url(#goldBand2)" rx="1"/>

  <!-- Gold decorations -->
  <circle cx="200" cy="310" r="5" fill="#ffd700"/>
  <rect x="55" y="320" width="290" height="3" fill="url(#goldBand2)" opacity="0.4"/>

  <!-- Ground -->
  <rect x="0" y="430" width="400" height="170" fill="#1a0a2e" opacity="0.8"/>

  <!-- Reflection -->
  <rect x="0" y="430" width="400" height="5" fill="#fdcb6e" opacity="0.2"/>

  <!-- Title -->
  <text x="200" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffd700" font-weight="bold">غروب في الحرم</text>
  <text x="200" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">Sunset at the Haram</text>
</svg>
