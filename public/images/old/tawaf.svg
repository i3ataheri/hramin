<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="tawafSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="30%" stop-color="#1a1a3e"/>
      <stop offset="60%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#4a1942"/>
    </linearGradient>
    <radialGradient id="centerLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#tawafSky)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="40" cy="30" r="1"/>
    <circle cx="120" cy="50" r="1.3"/>
    <circle cx="200" cy="20" r="0.9"/>
    <circle cx="280" cy="40" r="1.1"/>
    <circle cx="360" cy="25" r="1.2"/>
    <circle cx="80" cy="80" r="0.7"/>
    <circle cx="320" cy="70" r="1"/>
  </g>

  <!-- Center light -->
  <circle cx="200" cy="300" r="180" fill="url(#centerLight)"/>

  <!-- Concentric circles (Tawaf path) -->
  <g fill="none" stroke="#ffd700" stroke-width="0.8" opacity="0.12">
    <ellipse cx="200" cy="320" rx="50" ry="30"/>
    <ellipse cx="200" cy="320" rx="75" ry="45"/>
    <ellipse cx="200" cy="320" rx="100" ry="60"/>
    <ellipse cx="200" cy="320" rx="125" ry="75"/>
    <ellipse cx="200" cy="320" rx="150" ry="90"/>
  </g>

  <!-- Kaaba -->
  <rect x="170" y="290" width="60" height="60" fill="#0a0a0a" rx="2"/>
  <rect x="170" y="305" width="60" height="6" fill="url(#gold6)"/>
  <rect x="185" y="315" width="30" height="35" fill="url(#gold6)" rx="1"/>

  <!-- People around Kaaba (Tawaf) -->
  <g fill="#fff" opacity="0.25">
    <circle cx="150" cy="310" r="3"/>
    <circle cx="145" cy="320" r="3"/>
    <circle cx="148" cy="330" r="3"/>
    <circle cx="250" cy="310" r="3"/>
    <circle cx="255" cy="320" r="3"/>
    <circle cx="252" cy="330" r="3"/>
    <circle cx="180" cy="355" r="3"/>
    <circle cx="195" cy="358" r="3"/>
    <circle cx="210" cy="355" r="3"/>
    <circle cx="220" cy="358" r="3"/>
  </g>

  <!-- Outer walls -->
  <g fill="#1a1a3e" opacity="0.5">
    <rect x="10" y="280" width="150" height="120" rx="5"/>
    <rect x="240" y="280" width="150" height="120" rx="5"/>
  </g>

  <!-- Arches -->
  <g fill="none" stroke="url(#gold6)" stroke-width="1.5" opacity="0.25">
    <path d="M20,280 Q55,260 90,280"/>
    <path d="M60,280 Q95,260 130,280"/>
    <path d="M100,280 Q135,260 170,280"/>
    <path d="M230,280 Q265,260 300,280"/>
    <path d="M270,280 Q305,260 340,280"/>
    <path d="M310,280 Q345,260 380,280"/>
  </g>

  <!-- Dome -->
  <ellipse cx="200" cy="280" rx="85" ry="45" fill="#1a1a3e" opacity="0.4"/>

  <!-- Gold decoration on dome -->
  <circle cx="200" cy="238" r="5" fill="url(#gold6)"/>

  <!-- Ground -->
  <rect x="0" y="420" width="400" height="180" fill="#0c0c1d"/>
  <rect x="0" y="420" width="400" height="5" fill="url(#gold6)" opacity="0.2"/>

  <!-- Light rays from ground -->
  <g fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.1">
    <line x1="100" y1="425" x2="80" y2="500"/>
    <line x1="200" y1="425" x2="200" y2="510"/>
    <line x1="300" y1="425" x2="320" y2="500"/>
  </g>

  <!-- Title -->
  <text x="200" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#ffd700" font-weight="bold">طواف حول الكعبة</text>
  <text x="200" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">Tawaf around the Kaaba</text>
</svg>
