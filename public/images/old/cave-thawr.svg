<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="hijraSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="30%" stop-color="#1b263b"/>
      <stop offset="60%" stop-color="#415a77"/>
      <stop offset="100%" stop-color="#778da9"/>
    </linearGradient>
    <radialGradient id="caveLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="600" fill="url(#hijraSky)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.8">
    <circle cx="30" cy="25" r="1.2"/>
    <circle cx="100" cy="45" r="1"/>
    <circle cx="180" cy="15" r="1.5"/>
    <circle cx="260" cy="35" r="1.1"/>
    <circle cx="370" cy="20" r="1.3"/>
    <circle cx="60" cy="70" r="0.8"/>
    <circle cx="340" cy="60" r="0.9"/>
  </g>

  <!-- Mountain - Mount Thawr -->
  <polygon points="100,380 200,200 300,380" fill="#1b263b"/>
  <polygon points="120,380 200,220 280,380" fill="#243447"/>

  <!-- Cave -->
  <ellipse cx="200" cy="310" rx="30" ry="25" fill="#0d1b2a"/>
  <ellipse cx="200" cy="310" rx="20" ry="15" fill="#1a1a2e"/>

  <!-- Light from cave -->
  <circle cx="200" cy="310" r="40" fill="url(#caveLight)"/>

  <!-- Ground -->
  <rect x="0" y="380" width="400" height="220" fill="#415a77" opacity="0.3"/>
  <rect x="0" y="380" width="400" height="220" fill="#e8d5b7"/>

  <!-- City lights in distance -->
  <g fill="#ffd700" opacity="0.2">
    <circle cx="50" cy="390" r="2"/>
    <circle cx="100" cy="388" r="1.5"/>
    <circle cx="300" cy="392" r="2"/>
    <circle cx="350" cy="389" r="1.5"/>
  </g>

  <!-- Path -->
  <path d="M200,380 Q180,420 160,460 Q140,500 120,540" fill="none" stroke="#c9a96e" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- Title -->
  <text x="200" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#415a77" font-weight="bold">غار ثور</text>
  <text x="200" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1b263b">Cave of Thawr</text>
</svg>
